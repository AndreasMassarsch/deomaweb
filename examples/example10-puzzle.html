<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Exempel 10 — Pussel v3</title>
<style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#fff;}</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head><body>
<svg width="520" height="480" viewBox="0 0 520 480" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!--
    Classic jigsaw: each piece has tabs/slots on ALL edges where they connect.
    Outer edges are flat/rounded corners.
    Tab = bump out (~20px radius semicircle)
    Slot = indent in (~20px radius semicircle)
    Grid: 2x2, each cell ~200x180
  -->

  <!-- Piece 1: WEB (top-left) -->
  <!-- Top: flat, Right: tab out, Bottom: tab out, Left: flat -->
  <path d="
    M15,15 Q15,10 20,10 L185,10 Q190,10 190,15
    L190,70 C195,70 210,72 210,90 C210,108 195,110 190,110
    L190,165 Q190,170 185,170
    L120,170 C120,175 118,190 100,190 C82,190 80,175 80,170
    L20,170 Q15,170 15,165 Z
  " fill="none" stroke="#C0C0C0" stroke-width="1"/>
  <text x="100" y="100" text-anchor="middle" fill="#888" font-family="DM Sans" font-size="16" font-weight="400" letter-spacing="0.2em">WEB</text>

  <!-- Piece 2: AI (top-right) -->
  <!-- Top: flat, Right: flat, Bottom: tab out, Left: slot in -->
  <path d="
    M230,15 Q230,10 235,10 L415,10 Q420,10 420,15
    L420,165 Q420,170 415,170
    L350,170 C350,175 348,190 330,190 C312,190 310,175 310,170
    L235,170 Q230,170 230,165
    L230,110 C225,110 210,108 210,90 C210,72 225,70 230,70
    Z
  " fill="none" stroke="#C0C0C0" stroke-width="1"/>
  <text x="325" y="100" text-anchor="middle" fill="#888" font-family="DM Sans" font-size="16" font-weight="400" letter-spacing="0.2em">AI</text>

  <!-- Piece 3: MOBIL (bottom-left) -->
  <!-- Top: slot in, Right: tab out, Bottom: flat, Left: flat -->
  <path d="
    M15,210 Q15,205 20,205
    L80,205 C80,200 82,185 100,185 C118,185 120,200 120,205
    L185,205 Q190,205 190,210
    L190,265 C195,265 210,267 210,285 C210,303 195,305 190,305
    L190,360 Q190,365 185,365
    L20,365 Q15,365 15,360 Z
  " fill="none" stroke="#888" stroke-width="1"/>
  <text x="100" y="295" text-anchor="middle" fill="#555" font-family="DM Sans" font-size="14" font-weight="400" letter-spacing="0.2em">MOBIL</text>

  <!-- Piece 4: INNOVATION (bottom-right, red) -->
  <!-- Top: slot in, Right: flat, Bottom: flat, Left: slot in -->
  <path d="
    M230,210 Q230,205 235,205
    L310,205 C310,200 312,185 330,185 C348,185 350,200 350,205
    L415,205 Q420,205 420,210
    L420,360 Q420,365 415,365
    L235,365 Q230,365 230,360
    L230,305 C225,305 210,303 210,285 C210,267 225,265 230,265
    Z
  " fill="none" stroke="#CC0000" stroke-width="1.25"/>
  <text x="325" y="290" text-anchor="middle" fill="#CC0000" font-family="DM Sans" font-size="11.5" font-weight="500" letter-spacing="0.18em">INNOVATION</text>

  <!-- Piece 5: AFFÄR (loose piece, drifting to bottom-right) -->
  <!-- Has a slot on left that would connect to piece 4's right side -->
  <g transform="translate(38, 18)">
    <path d="
      M440,210 Q440,205 445,205
      L555,205 Q560,205 560,210
      L560,360 Q560,365 555,365
      L445,365 Q440,365 440,360
      L440,305 C435,305 420,303 420,285 C420,267 435,265 440,265
      Z
    " fill="none" stroke="#CC0000" stroke-width="1" stroke-dasharray="5,4"/>
    <text x="500" y="293" text-anchor="middle" fill="#CC0000" font-family="DM Sans" font-size="14" font-weight="500" letter-spacing="0.18em" opacity="0.5">AFFÄR</text>
  </g>

</svg>
</body></html>
