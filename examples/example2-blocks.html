<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Exempel 2 — Byggblock</title>
<style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#fff;}</style>
</head><body>
<!-- Variant 2: Asymmetriska block som "byggs upp" — Wiener Werkstätte möter modern konstruktion -->
<svg width="400" height="480" viewBox="0 0 400 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stacked rising blocks — abstract "building" metaphor -->
  <!-- Bottom row -->
  <rect x="0" y="400" width="80" height="80" fill="#111111"/>
  <rect x="80" y="400" width="80" height="80" fill="#111111"/>
  <rect x="160" y="400" width="80" height="80" fill="#111111"/>
  <rect x="240" y="400" width="80" height="80" fill="#111111"/>
  <rect x="320" y="400" width="80" height="80" fill="#E0E0E0"/>

  <!-- Second row -->
  <rect x="0" y="320" width="80" height="80" fill="#111111"/>
  <rect x="80" y="320" width="80" height="80" fill="#CC0000"/>
  <rect x="160" y="320" width="80" height="80" fill="#111111"/>
  <rect x="240" y="320" width="80" height="80" fill="#E0E0E0"/>

  <!-- Third row -->
  <rect x="0" y="240" width="80" height="80" fill="#E0E0E0"/>
  <rect x="80" y="240" width="80" height="80" fill="#111111"/>
  <rect x="160" y="240" width="80" height="80" fill="#E0E0E0"/>

  <!-- Fourth row -->
  <rect x="80" y="160" width="80" height="80" fill="#E0E0E0"/>
  <rect x="160" y="160" width="80" height="80" fill="#CC0000"/>

  <!-- Top -->
  <rect x="80" y="80" width="80" height="80" fill="#111111"/>

  <!-- Thin grid lines over everything -->
  <line x1="80" y1="80" x2="80" y2="480" stroke="#fff" stroke-width="2"/>
  <line x1="160" y1="80" x2="160" y2="480" stroke="#fff" stroke-width="2"/>
  <line x1="240" y1="160" x2="240" y2="480" stroke="#fff" stroke-width="2"/>
  <line x1="320" y1="320" x2="320" y2="480" stroke="#fff" stroke-width="2"/>
  <line x1="0" y1="400" x2="400" y2="400" stroke="#fff" stroke-width="2"/>
  <line x1="0" y1="320" x2="320" y2="320" stroke="#fff" stroke-width="2"/>
  <line x1="0" y1="240" x2="240" y2="240" stroke="#fff" stroke-width="2"/>
  <line x1="80" y1="160" x2="240" y2="160" stroke="#fff" stroke-width="2"/>
</svg>
</body></html>
