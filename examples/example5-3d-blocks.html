<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Exempel 5 — 3D Klossar v2</title>
<style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#fff;}</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head><body>
<svg width="560" height="520" viewBox="0 0 560 520" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- === BOTTOM ROW (3 blocks) === -->

  <!-- WEB -->
  <g transform="translate(180, 390)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#1a1a1a"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#2a2a2a"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#333"/>
    <text x="0" y="-36" text-anchor="middle" fill="#666" font-family="DM Sans" font-size="12" font-weight="500" letter-spacing="0.18em">WEB</text>
  </g>

  <!-- AI -->
  <g transform="translate(360, 390)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#1a1a1a"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#2a2a2a"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#333"/>
    <text x="0" y="-36" text-anchor="middle" fill="#666" font-family="DM Sans" font-size="12" font-weight="500" letter-spacing="0.18em">AI</text>
  </g>

  <!-- MOBIL -->
  <g transform="translate(270, 345)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#1a1a1a"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#2a2a2a"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#383838"/>
    <text x="0" y="-36" text-anchor="middle" fill="#666" font-family="DM Sans" font-size="11" font-weight="500" letter-spacing="0.18em">MOBIL</text>
  </g>

  <!-- === SECOND ROW (2 blocks) === -->

  <!-- STRATEGI -->
  <g transform="translate(180, 280)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#222"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#2d2d2d"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#3d3d3d"/>
    <text x="0" y="-36" text-anchor="middle" fill="#777" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.18em">STRATEGI</text>
  </g>

  <!-- AFFÄR -->
  <g transform="translate(360, 280)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#222"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#2d2d2d"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#3d3d3d"/>
    <text x="0" y="-36" text-anchor="middle" fill="#777" font-family="DM Sans" font-size="11" font-weight="500" letter-spacing="0.18em">AFFÄR</text>
  </g>

  <!-- === THIRD ROW (1 block, red) === -->

  <!-- PRODUKT -->
  <g transform="translate(270, 235)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#a30000"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#b80000"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#CC0000"/>
    <text x="0" y="-36" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.18em">PRODUKT</text>
  </g>

  <!-- === TOP (pinnacle, red) === -->

  <!-- BOLAG -->
  <g transform="translate(270, 150)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#a30000"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#b80000"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#CC0000"/>
    <text x="0" y="-36" text-anchor="middle" fill="#fff" font-family="DM Sans" font-size="12" font-weight="500" letter-spacing="0.18em">BOLAG</text>
  </g>

</svg>
</body></html>
