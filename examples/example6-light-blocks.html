<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Exempel 6 — Light 3D Klossar</title>
<style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#fff;}</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head><body>
<svg width="560" height="520" viewBox="0 0 560 520" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Mondaine-style: white faces, light gray shadows, thin black edges, red accent -->

  <!-- === BOTTOM ROW === -->

  <!-- WEB -->
  <g transform="translate(180, 390)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#E8E8E8" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#F0F0F0" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#FFFFFF" stroke="#111" stroke-width="1"/>
    <text x="0" y="-36" text-anchor="middle" fill="#111" font-family="DM Sans" font-size="12" font-weight="500" letter-spacing="0.18em">WEB</text>
  </g>

  <!-- AI -->
  <g transform="translate(360, 390)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#E8E8E8" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#F0F0F0" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#FFFFFF" stroke="#111" stroke-width="1"/>
    <text x="0" y="-36" text-anchor="middle" fill="#111" font-family="DM Sans" font-size="12" font-weight="500" letter-spacing="0.18em">AI</text>
  </g>

  <!-- MOBIL -->
  <g transform="translate(270, 345)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#E8E8E8" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#F0F0F0" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#FFFFFF" stroke="#111" stroke-width="1"/>
    <text x="0" y="-36" text-anchor="middle" fill="#111" font-family="DM Sans" font-size="11" font-weight="500" letter-spacing="0.18em">MOBIL</text>
  </g>

  <!-- === SECOND ROW === -->

  <!-- STRATEGI -->
  <g transform="translate(180, 280)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#E8E8E8" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#F0F0F0" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#FFFFFF" stroke="#111" stroke-width="1"/>
    <text x="0" y="-36" text-anchor="middle" fill="#111" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.18em">STRATEGI</text>
  </g>

  <!-- AFFÄR -->
  <g transform="translate(360, 280)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#E8E8E8" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#F0F0F0" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#FFFFFF" stroke="#111" stroke-width="1"/>
    <text x="0" y="-36" text-anchor="middle" fill="#111" font-family="DM Sans" font-size="11" font-weight="500" letter-spacing="0.18em">AFFÄR</text>
  </g>

  <!-- === THIRD ROW (red) === -->

  <!-- PRODUKT -->
  <g transform="translate(270, 235)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#a30000" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#CC0000" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#DD2222" stroke="#111" stroke-width="1"/>
    <text x="0" y="-36" text-anchor="middle" fill="#fff" font-family="DM Sans" font-size="10" font-weight="500" letter-spacing="0.18em">PRODUKT</text>
  </g>

  <!-- === TOP (red) === -->

  <!-- BOLAG -->
  <g transform="translate(270, 150)">
    <polygon points="0,0 90,45 90,110 0,65" fill="#a30000" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="#CC0000" stroke="#111" stroke-width="1"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="#DD2222" stroke="#111" stroke-width="1"/>
    <text x="0" y="-36" text-anchor="middle" fill="#fff" font-family="DM Sans" font-size="12" font-weight="500" letter-spacing="0.18em">BOLAG</text>
  </g>

</svg>
</body></html>
