<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Exempel 7 — Ritning</title>
<style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#fff;}</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head><body>
<svg width="560" height="520" viewBox="0 0 560 520" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Architectural wireframe style — thin lines, no fill, red accent on top -->

  <!-- === BOTTOM ROW === -->

  <!-- WEB -->
  <g transform="translate(180, 390)">
    <polygon points="0,0 90,45 90,110 0,65" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <text x="0" y="-36" text-anchor="middle" fill="#999" font-family="DM Sans" font-size="10" font-weight="400" letter-spacing="0.2em">WEB</text>
  </g>

  <!-- AI -->
  <g transform="translate(360, 390)">
    <polygon points="0,0 90,45 90,110 0,65" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <text x="0" y="-36" text-anchor="middle" fill="#999" font-family="DM Sans" font-size="10" font-weight="400" letter-spacing="0.2em">AI</text>
  </g>

  <!-- MOBIL -->
  <g transform="translate(270, 345)">
    <polygon points="0,0 90,45 90,110 0,65" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <text x="0" y="-36" text-anchor="middle" fill="#999" font-family="DM Sans" font-size="10" font-weight="400" letter-spacing="0.2em">MOBIL</text>
  </g>

  <!-- === SECOND ROW === -->

  <!-- STRATEGI -->
  <g transform="translate(180, 280)">
    <polygon points="0,0 90,45 90,110 0,65" fill="none" stroke="#999" stroke-width="0.75"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="none" stroke="#999" stroke-width="0.75"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="none" stroke="#999" stroke-width="0.75"/>
    <text x="0" y="-36" text-anchor="middle" fill="#666" font-family="DM Sans" font-size="10" font-weight="400" letter-spacing="0.2em">STRATEGI</text>
  </g>

  <!-- AFFÄR -->
  <g transform="translate(360, 280)">
    <polygon points="0,0 90,45 90,110 0,65" fill="none" stroke="#999" stroke-width="0.75"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="none" stroke="#999" stroke-width="0.75"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="none" stroke="#999" stroke-width="0.75"/>
    <text x="0" y="-36" text-anchor="middle" fill="#666" font-family="DM Sans" font-size="10" font-weight="400" letter-spacing="0.2em">AFFÄR</text>
  </g>

  <!-- === THIRD ROW — slightly darker lines === -->

  <!-- PRODUKT -->
  <g transform="translate(270, 235)">
    <polygon points="0,0 90,45 90,110 0,65" fill="none" stroke="#555" stroke-width="1"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="none" stroke="#555" stroke-width="1"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="none" stroke="#555" stroke-width="1"/>
    <text x="0" y="-36" text-anchor="middle" fill="#333" font-family="DM Sans" font-size="10" font-weight="400" letter-spacing="0.2em">PRODUKT</text>
  </g>

  <!-- === TOP — red wireframe === -->

  <!-- BOLAG -->
  <g transform="translate(270, 150)">
    <polygon points="0,0 90,45 90,110 0,65" fill="none" stroke="#CC0000" stroke-width="1.25"/>
    <polygon points="0,0 -90,45 -90,110 0,65" fill="none" stroke="#CC0000" stroke-width="1.25"/>
    <polygon points="0,0 90,-45 0,-90 -90,-45" fill="none" stroke="#CC0000" stroke-width="1.25"/>
    <text x="0" y="-36" text-anchor="middle" fill="#CC0000" font-family="DM Sans" font-size="11" font-weight="500" letter-spacing="0.2em">BOLAG</text>
  </g>

  <!-- Subtle dimension lines -->
  <line x1="60" y1="435" x2="60" y2="150" stroke="#E0E0E0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="480" y1="435" x2="480" y2="280" stroke="#E0E0E0" stroke-width="0.5" stroke-dasharray="4,4"/>

</svg>
</body></html>
