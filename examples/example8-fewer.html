<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Exempel 8 — Färre block</title>
<style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#fff;gap:80px;}</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head><body>

<!-- A: Färre, större wireframe-klossar -->
<svg width="420" height="400" viewBox="0 0 420 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- WEB -->
  <g transform="translate(130, 300)">
    <polygon points="0,0 110,55 110,130 0,75" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <polygon points="0,0 -110,55 -110,130 0,75" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <polygon points="0,0 110,-55 0,-110 -110,-55" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <text x="0" y="-46" text-anchor="middle" fill="#888" font-family="DM Sans" font-size="13" font-weight="400" letter-spacing="0.2em">WEB</text>
  </g>

  <!-- AI -->
  <g transform="translate(350, 300)">
    <polygon points="0,0 110,55 110,130 0,75" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <polygon points="0,0 -110,55 -110,130 0,75" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <polygon points="0,0 110,-55 0,-110 -110,-55" fill="none" stroke="#C0C0C0" stroke-width="0.75"/>
    <text x="0" y="-46" text-anchor="middle" fill="#888" font-family="DM Sans" font-size="13" font-weight="400" letter-spacing="0.2em">AI</text>
  </g>

  <!-- MOBIL -->
  <g transform="translate(240, 245)">
    <polygon points="0,0 110,55 110,130 0,75" fill="none" stroke="#888" stroke-width="0.75"/>
    <polygon points="0,0 -110,55 -110,130 0,75" fill="none" stroke="#888" stroke-width="0.75"/>
    <polygon points="0,0 110,-55 0,-110 -110,-55" fill="none" stroke="#888" stroke-width="0.75"/>
    <text x="0" y="-46" text-anchor="middle" fill="#555" font-family="DM Sans" font-size="13" font-weight="400" letter-spacing="0.2em">MOBIL</text>
  </g>

  <!-- AFFÄR (red, top) -->
  <g transform="translate(240, 120)">
    <polygon points="0,0 110,55 110,130 0,75" fill="none" stroke="#CC0000" stroke-width="1"/>
    <polygon points="0,0 -110,55 -110,130 0,75" fill="none" stroke="#CC0000" stroke-width="1"/>
    <polygon points="0,0 110,-55 0,-110 -110,-55" fill="none" stroke="#CC0000" stroke-width="1"/>
    <text x="0" y="-46" text-anchor="middle" fill="#CC0000" font-family="DM Sans" font-size="13" font-weight="500" letter-spacing="0.2em">AFFÄR</text>
  </g>
</svg>

<!-- B: Pusselbit-variant -->
<svg width="420" height="400" viewBox="0 0 420 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Puzzle tab (bump) pointing right -->
    <path id="tab-r" d="M0,0 C12,-14 28,-14 40,0" fill="none"/>
    <!-- Puzzle tab (bump) pointing down -->
    <path id="tab-d" d="M0,0 C-14,12 -14,28 0,40" fill="none"/>
  </defs>

  <!-- 2x2 puzzle grid, each piece ~160x140 -->

  <!-- Piece 1: WEB (top-left) -->
  <g transform="translate(30, 40)">
    <path d="
      M0,0 L140,0
      C140,0 150,20 160,20 C170,20 180,0 180,0
      L180,0 L180,110
      C180,110 160,120 160,130 C160,140 180,150 180,150
      L180,150 L0,150 L0,0 Z
    " fill="none" stroke="#C0C0C0" stroke-width="1"/>
    <text x="80" y="82" text-anchor="middle" fill="#888" font-family="DM Sans" font-size="14" font-weight="400" letter-spacing="0.2em">WEB</text>
  </g>

  <!-- Piece 2: AI (top-right) -->
  <g transform="translate(210, 40)">
    <path d="
      M0,0
      C0,0 10,20 20,20 C30,20 40,0 40,0
      L180,0 L180,110
      C180,110 160,120 160,130 C160,140 180,150 180,150
      L180,150 L40,150
      C40,150 30,130 20,130 C10,130 0,150 0,150
      L0,150 L0,0 Z
    " fill="none" stroke="#C0C0C0" stroke-width="1"/>
    <text x="95" y="82" text-anchor="middle" fill="#888" font-family="DM Sans" font-size="14" font-weight="400" letter-spacing="0.2em">AI</text>
  </g>

  <!-- Piece 3: MOBIL (bottom-left) -->
  <g transform="translate(30, 190)">
    <path d="
      M0,0 L140,0
      C140,0 150,20 160,20 C170,20 180,0 180,0
      L180,0
      C180,0 160,10 160,20 C160,30 180,40 180,40
      L180,150 L0,150 L0,0 Z
    " fill="none" stroke="#888" stroke-width="1"/>
    <text x="80" y="85" text-anchor="middle" fill="#555" font-family="DM Sans" font-size="14" font-weight="400" letter-spacing="0.2em">MOBIL</text>
  </g>

  <!-- Piece 4: AFFÄR (bottom-right, red) -->
  <g transform="translate(210, 190)">
    <path d="
      M0,0
      C0,0 10,20 20,20 C30,20 40,0 40,0
      L180,0
      C180,0 160,10 160,20 C160,30 180,40 180,40
      L180,150
      L40,150
      C40,150 30,130 20,130 C10,130 0,150 0,150
      L0,0 Z
    " fill="none" stroke="#CC0000" stroke-width="1.25"/>
    <text x="95" y="85" text-anchor="middle" fill="#CC0000" font-family="DM Sans" font-size="14" font-weight="500" letter-spacing="0.2em">AFFÄR</text>
  </g>

</svg>

</body></html>
